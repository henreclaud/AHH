<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin · Animal Assisted Happiness</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">
          <!-- ↓ AAH LOGO — save your image to public/images/aah-logo.png -->
          <img class="brand-logo" src="images/aah-logo.svg" alt="Animal Assisted Happiness logo" />
          <!-- ↑ AAH LOGO ─────────────────────────────────────────────── -->
          <span class="brand-text">Animal Assisted Happiness</span>
        </a>
        <a class="link" href="index.html">Volunteer page</a>
      </div>
    </header>

    <main class="container">
      <h1 class="page-title">Admin — Signups</h1>
      <p class="page-sub">
        Visits are managed in
        <strong>Google Calendar</strong> — add, edit, or cancel events there and
        they appear here within 5 minutes. Signups are saved to
        <strong>Google Sheets</strong>.
      </p>

      <!-- List of shifts pulled from Google Calendar, each with its signups -->
      <section>
        <div id="admin-shifts"></div>
        <p id="admin-status" class="status"></p>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
